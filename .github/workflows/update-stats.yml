name: Update Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create profile folder
        run: mkdir -p profile

      - name: Fetch stats SVG
        run: |
          curl -f -s "https://github-readme-stats.vercel.app/api?username=mayank4singh&show_icons=true&theme=tokyonight&hide_border=true&count_private=true&title_color=7F52FF&icon_color=FF9900&text_color=c9d1d9&bg_color=0d1117" \
            -o profile/stats.svg

      - name: Fetch languages SVG
        run: |
          curl -f -s "https://github-readme-stats.vercel.app/api/top-langs/?username=mayank4singh&layout=compact&theme=tokyonight&hide_border=true&count_private=true&title_color=7F52FF&text_color=c9d1d9&bg_color=0d1117" \
            -o profile/langs.svg

      - name: Fetch streak SVG
        run: |
          curl -f -s "https://streak-stats.demolab.com/?user=mayank4singh&theme=tokyonight&hide_border=true&background=0d1117&fire=FF9900&ring=7F52FF&stroke=7F52FF&currStreakLabel=FF9900&sideNums=c9d1d9&sideLabels=c9d1d9" \
            -o profile/streak.svg

      - name: Check files
        run: ls -la profile/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update stats"
          git push
